# Demo: Claude Code (Anthropic protocol) → Busbar → Amazon Nova on Bedrock.
# The agent speaks Anthropic; Busbar translates to Bedrock Converse and back.
listen: "127.0.0.1:8080"

# Signed-key auth: mint a key via the admin API (POST /api/v1/admin/keys) and give it to the
# agent as its bearer token. An empty chain would be an open relay (dev only).
auth:
  chain:
    - keys
  upstream_credentials: own
  admin_auth:
    - admin-tokens: { token: { env: BUSBAR_ADMIN_TOKEN } }

observability:
  emit_server_timing: true

providers:
  bedrock:
    api_key: { env: AWS_BEDROCK_CREDS }

models:
  amazon-nova:
    provider: bedrock
    max_concurrent: 10
    max_requests: -1
    upstream_model: amazon.nova-pro-v1:0   # the real Bedrock modelId that answers

pools:
  claude-code:
    members:
      - model: amazon-nova
        weight: 1
