#
# busbar deployment configuration (config.yaml).
#
# Two-file model:
#   • providers.yaml  — the vetted provider catalog (protocol, base_url, error_map). Shipped.
#   • config.yaml     — THIS file: your deployment. References providers by NAME and supplies their
#                       keys via environment-variable names (never the keys themselves).
#
# Flow: clients call busbar; busbar routes each request to a `model` or a `pool` of models, tracks
# per-member health with a circuit breaker, and translates between protocols when a client speaks a
# different wire format than the chosen backend. Secrets are never written here — configure the
# environment-variable NAME that holds each key; dollar-brace placeholders are expanded at load time
# (see `client_tokens` below). Every such placeholder's variable must be set in the environment.
#
# This example builds up from the simplest case to progressively richer pools — read top to bottom.

# ── Listen address ───────────────────────────────────────────────────────────────────────────────
listen: "0.0.0.0:8080"

# ── Admin plane (always its own listener) ──────────────────────────────────────────────────────────
# The admin API (/api/v1/admin/…) ALWAYS runs on its OWN listener — it is never served on the data
# `listen` above. The management plane is privileged, so it stays isolated with its own TLS/mTLS,
# bind, and firewall posture, independent of public LLM traffic. `admin_listen` defaults to loopback
# (127.0.0.1:8081), so a zero-config deployment boots with admin reachable only on-host.
#
# SECURITY: a network-exposed admin_listen (any non-loopback bind) REFUSES TO BOOT unless it requires
# client-certificate mTLS via admin_tls.client_ca_file. A loopback bind (127.0.0.1 / ::1 / localhost)
# is exempt. To run a token-only admin plane on an exposed address on purpose — e.g. behind a mesh
# that terminates mTLS — set `admin_insecure: true` to waive the guard deliberately.
#
# admin_listen: "127.0.0.1:8081"    # default; set an exposed address (+ admin_tls) to manage off-host
# admin_tls:
#   cert_file: "/etc/busbar/admin-cert.pem"
#   key_file:  "/etc/busbar/admin-key.pem"
#   client_ca_file: "/etc/busbar/admin-client-ca.pem"   # present ⇒ mTLS required on the admin plane
# admin_insecure: false                                  # true ⇒ waive the exposed-admin mTLS guard

# ── Client authentication ────────────────────────────────────────────────────────────────────────
# auth.chain — an ordered list of auth modules that identify the caller. `tokens` is the built-in:
#   clients must send `Authorization: Bearer <token>` matching the allowlist below. An EMPTY chain is
#   an open relay (no client auth; dev only). upstream_credentials controls whose key hits the
#   provider: `own` (default — busbar's configured key) or `passthrough` (forward the caller's key).
# When governance is active (admin_token set, bottom of file), virtual keys supersede this for proxied requests.
auth:
  chain: [tokens]
  upstream_credentials: own
  client_tokens:
    - "${BUSBAR_CLIENT_TOKEN}"        # one or more allowed client tokens (env-expanded)

# ── Providers ────────────────────────────────────────────────────────────────────────────────────
# Reference a provider NAME from providers.yaml and give the env var holding its key. protocol /
# base_url / error_map are inherited from providers.yaml; override here only in unusual cases.
providers:
  anthropic:
    api_key_env: ANTHROPIC_KEY
    # Optional active health probing for this provider's lanes (default: no probing — health is
    # inferred from real traffic via the breaker + half-open probe).
    #   mode: none   — passive only (default).
    #        dead   — periodically re-probe ONLY tripped lanes so they recover faster.
    #        active — periodically probe EVERY lane (sends a tiny billable request per interval).
    # health:
    #   mode: dead
    #   interval_secs: 30   # default 30
    #   timeout_secs: 5     # default 5
  openai:
    api_key_env: OPENAI_KEY
  gemini:
    api_key_env: GEMINI_KEY
  z.ai:
    api_key_env: ZAI_KEY
  bedrock:
    # Bedrock auth is AWS SigV4: the key env holds `ACCESS_KEY_ID:SECRET_ACCESS_KEY[:SESSION_TOKEN]`.
    api_key_env: AWS_BEDROCK_CREDS

# ── Models ───────────────────────────────────────────────────────────────────────────────────────
# Each model names its provider, a per-model concurrency cap (max_concurrent), and an optional
# lifetime request budget (max_requests; -1 = unlimited). A model is a "lane" with its own semaphore
# and health state. Clients can target a model directly (`POST /<model>/v1/messages`) or via a pool.
#
# default_max_tokens (optional): output-token default injected ONLY when a cross-protocol translation
# targets a backend that REQUIRES max_tokens (the Anthropic Messages API) and the source request
# omitted it — legal for OpenAI clients, which rely on the server default. Without it, such a request
# 400s with `max_tokens: Field required`. Unset falls back to a conservative 4096; a caller-supplied
# max_tokens is always preserved. No effect on same-protocol passthrough. Must be > 0 when set.
# (Bedrock Converse defaults maxTokens when omitted, so it needs no injection.)
models:
  claude-sonnet:
    provider: anthropic
    max_concurrent: 20
    max_requests: -1
    # default_max_tokens: 4096   # backfill when an OpenAI client omits max_tokens (else 4096)
    # reasoning: true   # declare that THIS model accepts thinking params: with it, a translated
    #                   # reasoning ask (OpenAI reasoning_effort / Gemini thinkingBudget) reaches
    #                   # this lane as Anthropic thinking{budget_tokens}; without it the ask is
    #                   # dropped (warned) and never sent, so a non-thinking model never 400s.
  claude-haiku:
    provider: anthropic
    max_concurrent: 40
    max_requests: -1
  gpt-4o:
    provider: openai
    max_concurrent: 20
    max_requests: -1
  gpt-4o-mini:
    provider: openai
    max_concurrent: 50
    max_requests: -1
  gemini-1.5-pro:
    provider: gemini
    max_concurrent: 15
    max_requests: -1
  glm-4.6:
    provider: z.ai
    max_concurrent: 10
    max_requests: -1
  claude-sonnet-bedrock:
    provider: bedrock
    max_concurrent: 20
    max_requests: -1

# ── Pools ────────────────────────────────────────────────────────────────────────────────────────
# A pool is a named set of weighted member models. Its members' concurrency caps stack into one
# aggregate, and the breaker fails a request over to a healthy member when one is tripped. Target a
# pool with `POST /<pool>/v1/messages` (or the `model` field for `/v1/chat/completions`).
pools:

  # 1) Simplest pool: a single model. Useful to give a model a stable public name / alias.
  haiku:
    members:
      - target: claude-haiku

  # 2) Basic round-robin: equal-weight members. Smooth weighted round-robin spreads load evenly;
  #    if one member trips, traffic shifts to the others automatically.
  fast:
    members:
      - target: claude-haiku
      - target: gpt-4o-mini

  # 3) Weighted split: send ~80% to the first member, ~20% to the second (e.g. canarying a model).
  balanced:
    members:
      - target: claude-sonnet
        weight: 8
      - target: gpt-4o
        weight: 2

  # 4) Context-length aware: declare each member's max context window. A request that is too large
  #    for one member fails over to a larger-context member instead of erroring — without penalizing
  #    the smaller lane (it was healthy; the request simply didn't fit).
  long-context:
    members:
      - target: claude-sonnet
        context_max: 200000
      - target: gemini-1.5-pro
        context_max: 2000000

  # 5) Failover tuning: bound how long/often busbar retries across members for one request.
  #    timeout_secs — give up after this wall-clock budget. max_hops — at most this many failover hops.
  #    (the old keys `deadline_secs` / `cap` still load via aliases.)
  #    exclusions — member models to never fail a request over TO (e.g. an expensive last resort).
  resilient:
    members:
      - target: claude-sonnet
        weight: 3
      - target: gpt-4o
        weight: 2
      - target: glm-4.6
        weight: 1
    failover:
      timeout_secs: 30
      max_hops: 3
      exclusions:
        - glm-4.6        # kept in the pool for capacity, but never used as a failover destination

  # 5b) Per-attempt hang cap (attempt_timeout_ms): some providers fail by HANGING — the connection
  #     opens and headers never come back, silently eating the whole failover budget on one member.
  #     attempt_timeout_ms caps a single attempt's time to RESPONSE HEADERS; on expiry the attempt
  #     counts as a transient breaker failure and the request hops to the next member immediately.
  #     It never cuts a stream that has started answering (covers connect + headers only).
  #     Two layers: set it on a model (models.<name>.attempt_timeout_ms) as that model's default
  #     everywhere, and/or on a pool member to override per pool — so the SAME model can get 10s in
  #     a batch pool and 50ms in a latency-critical one. 0 is a startup error; omit to disable.
  realtime:
    members:
      - target: gemini-1.5-pro
        attempt_timeout_ms: 250   # this pool is time-critical: hop if no headers in 250ms
      - target: claude-haiku      # fallback lane picks the request up in-flight

  # 6) Exhaustion policy + fallback pool: when every member is tripped/at-capacity, choose what to do.
  #    action: reject | status_503 | least_bad | fallback_pool:<name>
  #      least_bad      — serve the member whose cooldown expires soonest rather than 503.
  #      fallback_pool  — route to another pool entirely (loop-guarded).
  primary:
    members:
      - target: claude-sonnet
      - target: gpt-4o
    on_exhausted:
      action: fallback_pool:overflow      # when primary is fully exhausted, spill to `overflow`

  # The fallback target referenced above. Its own exhaustion policy serves the soonest-healthy member.
  overflow:
    members:
      - target: claude-haiku
      - target: gpt-4o-mini
      - target: glm-4.6
    on_exhausted:
      action: least_bad

  # 7) Session affinity + cross-protocol: pin a conversation to one member while it's healthy (so
  #    cache/state stays warm), keyed by a request header. Members here span THREE protocols
  #    (Anthropic, OpenAI, Gemini) — a client speaking any one of them reaches all three, because
  #    busbar translates losslessly through its superset IR.
  smart:
    members:
      - target: claude-sonnet
        weight: 2
      - target: gpt-4o
        weight: 2
      - target: gemini-1.5-pro
        weight: 1
    affinity:
      mode: session              # stick to one member per session while it stays healthy
      header_name: x-session-id  # the request header carrying the session key (this is the default)

  # 8) Per-pool circuit breaker: tune when a member trips out and how long it cools down. Omit the
  #    block entirely for the ADR-0002 defaults (error_rate, 0.5 over a 30s/5-request floor).
  #      trip.mode        — error_rate (fraction of failures in a window) | consecutive (a streak).
  #      trip.window_secs — sliding window for error_rate (old key `window_s` still loads via alias).
  #      trip.threshold   — error fraction that trips (error_rate mode).
  #      trip.min_requests— floor: never trip on error_rate below this many outcomes in-window.
  #      trip.consecutive_n — consecutive failures that trip (consecutive mode; old key `n` aliased).
  #      base/max_cooldown_secs — first cooldown after a trip, and the exponential-backoff ceiling.
  #    (A server Retry-After header is always honored as a cooldown floor, on top of these.)
  sensitive:
    members:
      - target: claude-sonnet
      - target: gpt-4o
    breaker:
      trip:
        mode: consecutive        # trip fast on a short streak rather than a windowed rate
        consecutive_n: 2         # two consecutive failures trip the member out
      base_cooldown_secs: 5      # quick first probe-back…
      max_cooldown_secs: 60      # …backing off exponentially up to a minute

# ── Observability (optional) ─────────────────────────────────────────────────────────────────────
# Prometheus `/metrics` is always on and needs no config. These sinks/toggles are opt-in:
#   otlp_endpoint            — export OpenTelemetry traces (OTLP/HTTP) to a collector.
#   request_log_webhook_url  — fire-and-forget a JSON request-log POST per request.
#   emit_server_timing       — emit the `Server-Timing: busbar;dur=<ms>` response header (default
#                              true). Set false to suppress it entirely (it is an in-band busbar
#                              fingerprint you may want to hide for backend indistinguishability).
# observability:
#   otlp_endpoint: "http://localhost:4318/v1/traces"
#   request_log_webhook_url: "https://logs.example.com/busbar"
#   emit_server_timing: true

# ── Governance (optional) ────────────────────────────────────────────────────────────────────────
# Governance is ALWAYS available but INERT until you set an admin_token (and mint keys via the admin
# API). Once active, clients authenticate with busbar-issued VIRTUAL KEYS (managed via the admin API)
# instead of the static `auth` tokens above. Each key carries allowed-pools (403), a spend budget
# (429 when exceeded, or 400 for Bedrock ingress), and RPM/TPM rate limits (429). There is no `enabled`
# switch. The store defaults to ephemeral RAM (keys/budgets reset on restart); choose a durable `store`
# for persistence; each durable backend is a signed plugin tarball (see the `plugins:` block below).
# governance:
#   admin_token: "$BUSBAR_ADMIN_TOKEN"        # ACTIVATES enforcement; guards /api/v1/admin/keys; wrap the name in braces, "$" + "{NAME}", when uncommented to env-expand
#   price_per_request_cents: 1                # flat per-request budget charge
#   price_per_1k_tokens_cents: 50             # plus per-1000-token charge (from response usage)
#   # store: memory                          # default (ephemeral RAM); omit for the default
#   # For persistence, pick a durable store PLUGIN (requires plugins.enabled below) by ALIAS or
#   # CANONICAL NAME, plus its db_path target:
#   # store: sqlite                          # single-node durable (busbar-store-sqlite)
#   # db_path: /var/lib/busbar/governance.db
#   # store: postgres                        # cluster-shared keys/usage/audit; db_path is a postgres:// URL
#   # store: redis                           # cluster-shared keys/usage/audit; db_path is a redis:// (or rediss://) URL
#   # store: acme-store-dynamo               # or any third-party store plugin by manifest name
#   # usage_flush_interval_ms: 100           # write-behind flush cadence (ms) for durable stores

# ── Plugins (optional; OFF by default) ───────────────────────────────────────────────────────────
# The dynamic plugin subsystem: signed plugin tarballs ({cdylib + manifest.json} as one .tar.gz)
# that busbar verifies and loads at boot. With `enabled: false` (or this block absent) NO plugin
# ever loads - a tarball dropped in the directory is inert. busbar's own release key is EMBEDDED in
# the binary, so busbar-signed plugins verify with zero configuration; the trust block is for
# third-party publishers and explicit opt-ins. Validate ahead of boot with `busbar --validate`;
# inspect with `busbar --list-plugins`. See docs/plugins.md.
# plugins:
#   enabled: true                            # MASTER SWITCH (default false)
#   dir: plugins                             # where the signed .tar.gz tarballs live
#   trust:
#     publishers:                            # third-party ed25519 signing keys (allowlist)
#       - name: acme
#         public_key: "<64-hex ed25519 public key>"
#     allow_unsigned: false                  # explicit opt-in for unsigned plugins (default false)
#     allow_third_party: false               # explicit opt-in for non-allowlisted publishers
#   min_versions:                            # anti-downgrade floors by manifest name (third-party;
#     acme-store-dynamo: "2.0.0"             # first-party is auto-floored at the binary version)
