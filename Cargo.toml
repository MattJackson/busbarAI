[package]
name = "busbar"
version = "1.0.0-rc.2"
edition = "2021"
description = "Native-protocol LLM gateway: lossless cross-protocol translation, weighted pools, per-(pool,lane) circuit breaking, and governance — in one static Rust binary."
license = "AGPL-3.0-or-later"

[[bin]]
name = "busbar"
path = "src/main.rs"

[dependencies]
axum = "0.7"
# Only the subsystems busbar actually touches: the multi-thread runtime (#[tokio::main],
# spawn/JoinHandle), macros (main/test), net (TcpListener), time (sleep/interval), and sync
# (Semaphore/OwnedSemaphorePermit). The "full" meta-feature additionally pulls fs/process/signal/
# io-util/io-std/test-util — none referenced in src/ — so it is dropped to shrink the request-path
# binary's compile + attack surface.
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time", "sync"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# `serde_yaml` (dtolnay) is archived/deprecated — the locked 0.9 is literally `0.9.34+deprecated`
# and drags in the large `unsafe-libyaml` C transliteration. `serde_yaml_ng` is the maintained,
# API-compatible fork; the `package` rename keeps every `serde_yaml::from_str` call site unchanged.
serde_yaml = { package = "serde_yaml_ng", version = "0.10" }
futures = "0.3"
bytes = "1"
http-body-util = "0.1"
metrics = "0.24.6"
metrics-exporter-prometheus = "0.18.3"
opentelemetry = "0.32.0"
opentelemetry_sdk = "0.32.1"
# Pin OTLP to the HTTP/proto trace path busbar uses (`SpanExporter::builder().with_http()`), with
# the reqwest client on rustls so HTTPS export actually works. Dropping default features removes
# `reqwest-blocking-client` (a blocking reqwest busbar never uses) and the OTLP metrics/logs paths
# (busbar exports metrics via Prometheus, not OTLP).
opentelemetry-otlp = { version = "0.32.0", default-features = false, features = [
    "trace",
    "http-proto",
    "reqwest-rustls",
] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
tracing-opentelemetry = "0.33.0"
sha2 = "0.11.0"
hmac = "0.13.0"
hex = "0.4.3"
rusqlite = { version = "0.40.0", features = ["bundled"] }
getrandom = "0.2"
# CRC32 for the AWS `application/vnd.amazon.eventstream` encoder (Bedrock ingress streaming): AWS
# SDK clients validate both the prelude and message CRC32 on every frame, so the encoder needs a
# correct, fast CRC32. `crc32fast` is small, dependency-light, and the de-facto standard.
crc32fast = "1"

[dev-dependencies]
# In-crate #[cfg(test)] harness needs reqwest's json feature + axum http1 server.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }
axum = { version = "0.7", features = ["http1"] }
http-body-util = "0.1"
futures = "0.3"
bytes = "1"

[profile.release]
# Tuned for the shipped "deploy-and-done" binary: max optimization and smallest size,
# at the cost of slower release compiles (fine — releases are built in CI, not in the loop).
opt-level = 3        # full speed (was throttled to 2)
lto = "fat"          # whole-program inlining across crates: faster hot path + smaller binary
codegen-units = 1    # let LTO optimize across the whole crate graph (best codegen, smaller output)
strip = true         # strip symbols from the shipped binary (much smaller; set RUST_BACKTRACE aside)
# panic is left at the default `unwind` ON PURPOSE: a panic in one request task must unwind that
# task, not abort the whole gateway. `panic = "abort"` would trade per-request isolation for a
# little size — the wrong trade for a service in the request path.
