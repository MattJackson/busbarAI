name: diag-pulls
on: { workflow_dispatch: {} }
permissions: {}
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: probe
        run: |
          set -uo pipefail
          echo "== POST 403 full headers+body =="
          curl -s -D - -X POST "https://getbusbar.com/api/pulls" -H "authorization: Bearer BOGUS" -H "content-type: application/json" -d '{"repo":"getbusbar/busbar","pull_count":1}' | head -40
          echo
          echo "== plain GET / on getbusbar from runner =="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" "https://getbusbar.com/"
          echo "== GET read path /api/pulls?repo= from runner =="
          curl -s -D - "https://getbusbar.com/api/pulls?repo=getbusbar/busbar" | head -20
