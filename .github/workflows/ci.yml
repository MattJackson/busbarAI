name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

  # Compliance-by-compilation gate: busbar must build + lint clean with the built-in `tokens` auth
  # plugin COMPILED OUT (`--no-default-features`), so a regulated deployment can ship a binary that
  # provably contains no client-token auth code. Build, clippy, AND the test suite all stay green on
  # the featureless binary — the feature-dependent behavior tests (token auth, native ranking policies)
  # are `#[cfg(feature = ...)]`-gated, so what remains proves the featureless binary works. This is the
  # compliance-by-compilation guarantee: `auth.chain: [tokens]` is a boot error in this binary.
  no-default-features:
    name: no-default-features build · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (no-default-features)
        run: cargo clippy --no-default-features --locked -- -D warnings
      - name: Build (no-default-features)
        run: cargo build --no-default-features --locked --verbose
      - name: Test (no-default-features)
        run: cargo test --no-default-features --locked --verbose

  # Portability gate: busbar must build + pass tests on Windows too (no OS-specific code).
  windows:
    name: windows build · test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose
