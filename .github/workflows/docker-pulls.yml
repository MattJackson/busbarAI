# Live Docker Hub pull counts for the site badges. Docker Hub 429s Cloudflare's Worker egress IPs,
# so the Worker can't fetch it directly — but GitHub's runner IPs aren't blocked. This job fetches
# the counts hourly and POSTs them to the /api/pulls Worker, which stores them in KV and serves
# them to visitors. Auth is a shared secret (PULLS_WRITE_SECRET), not a Cloudflare API token.
name: docker-pulls

on:
  schedule:
    - cron: '17 * * * *' # hourly at :17 (off the top-of-hour stampede)
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: docker-pulls
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Push fresh pull counts to the Worker
        env:
          WRITE_SECRET: ${{ secrets.PULLS_WRITE_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${WRITE_SECRET:-}" ]; then echo "PULLS_WRITE_SECRET not set"; exit 1; fi
          for repo in getbusbar/busbar getbusbar/headroom-hook; do
            n=$(curl -fsS "https://hub.docker.com/v2/repositories/${repo}/" \
                  | python3 -c "import sys,json;print(int(json.load(sys.stdin)['pull_count']))")
            curl -fsS -X POST "https://getbusbar.com/api/pulls" \
              -H "authorization: Bearer ${WRITE_SECRET}" \
              -H "content-type: application/json" \
              -d "{\"repo\":\"${repo}\",\"pull_count\":${n}}" >/dev/null
            echo "updated ${repo} = ${n}"
          done
