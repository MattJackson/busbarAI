# Dependabot configuration — keeps dependencies current with automated PRs.
# Security updates are enabled separately in the repo's security settings.
version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"

  # GitHub Actions used by the CI / release / pages / security workflows.
  # A compromised action is itself a supply-chain vector, so these are tracked too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
