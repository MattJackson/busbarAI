# Infrastructure-as-code for the Docker Hub pull-count Worker.
#
# Deploy:   cd site/workers && npx wrangler deploy
# Secrets:  npx wrangler secret put DOCKERHUB_USER    (optional — see docker-pulls.mjs)
#           npx wrangler secret put DOCKERHUB_TOKEN   (a Docker Hub access token, not the password)
# Dry-run:  npx wrangler deploy --dry-run
#
# Fill the three <PLACEHOLDER> values from the Cloudflare dashboard (Workers & Pages → this Worker →
# Settings, and Storage → KV). They were previously set by hand at deploy; committing them here is
# the point of this file. account_id may instead be supplied via the CLOUDFLARE_ACCOUNT_ID env var.

name = "getbusbar-docker-pulls"          # TODO: match the existing Worker's name if different
main = "docker-pulls.mjs"
compatibility_date = "2026-07-01"
account_id = "<CLOUDFLARE_ACCOUNT_ID>"   # TODO

# The Cron Trigger that refreshes the counts (hourly at :17, off the top-of-hour stampede).
[triggers]
crons = ["17 * * * *"]

# KV namespace holding pulls:<repo> -> count.
[[kv_namespaces]]
binding = "PULLS_KV"
id = "<PULLS_KV_NAMESPACE_ID>"           # TODO

# Serve the read path on the production hostname.
[[routes]]
pattern = "getbusbar.com/api/pulls"
zone_name = "getbusbar.com"
