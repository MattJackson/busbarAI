listen: "0.0.0.0:8080"

auth:
  # Choose one of: token, passthrough, none
  # - token: require client token from allowlist (recommended for production)
  # - passthrough: forward caller's Bearer token upstream; 401/403 attributed to caller (§6 caveat)
  # - none: open relay; logs loud FATAL warning at startup (dev only, never production)
  mode: token
  client_tokens:
    - "${BUSBAR_CLIENT_TOKEN}"
    # Add additional allowed tokens here

providers:
  z.ai:
    protocol: anthropic
    base_url: https://api.z.ai/api/anthropic
    api_key_env: ZAI_KEY
    # Per-provider error code mappings (REQUIRED) — codes refine HTTP status classification
    error_map:
      "1113": billing
      "1302": rate_limit
  anthropic:
    protocol: anthropic
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_KEY
    # Anthropic uses HTTP status codes primarily; empty map is valid but must be present
    error_map: {}

models:
  glm-4.5:
    provider: z.ai
    max_concurrent: 10
    max_requests: -1
  glm-5.1:
    provider: z.ai
    max_concurrent: 10
    max_requests: -1
  glm-4.6:
    provider: z.ai
    max_concurrent: 3
    max_requests: -1

pools:
  glm:
    members:
      - target: glm-5.1
        weight: 1
      - target: glm-4.6
        weight: 1
      - target: glm-4.5
        weight: 1
  hindsight:
    members:
      - target: glm-5.1
        weight: 1
      - target: glm-4.6
        weight: 1
      - target: glm-4.5
        weight: 1
