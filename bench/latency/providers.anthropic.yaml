# Provider catalog for the REAL-provider latency benchmark (Anthropic). One provider, `anthropic`,
# pointed at the public API. The release binary already trusts api.anthropic.com's public-CA cert,
# so the busbar->upstream hop works with no cert gymnastics (unlike the local-mock mode).
anthropic:
  protocol: anthropic
  base_url: https://api.anthropic.com
  error_map: {}
