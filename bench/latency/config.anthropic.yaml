#
# Busbar config for the REAL-provider (Anthropic) latency benchmark. One provider, one model named
# for a real Anthropic model id (Busbar sends the model-entry key upstream), one single-member pool.
# Token auth with a fixed bench token; governance OFF (we measure the proxy hot path, not the control
# plane). The upstream Anthropic key comes from the ANTHROPIC_API_KEY env var — never written here.
#
# Methodology: the bench drives BOTH
#   direct : loadgen -> api.anthropic.com           (Anthropic Messages API, x-api-key)
#   busbar : loadgen -> busbar -> api.anthropic.com  (Anthropic ingress, same upstream model)
# and subtracts per percentile. Anthropic's latency is in BOTH paths and cancels in the delta, so
# `busbar - direct` is Busbar's added overhead — against real provider jitter.
listen: "127.0.0.1:8080"

auth:
  mode: token
  client_tokens:
    - "bench-token"

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY

models:
  # The entry KEY is the upstream model id Busbar forwards to Anthropic (there is no separate
  # upstream-model field). Keep this identical to the model the direct path calls, so both paths hit
  # the same Anthropic model and the delta is pure Busbar overhead.
  claude-haiku-4-5-20251001:
    provider: anthropic
    max_concurrent: 64
    default_max_tokens: 16

pools:
  bench-pool:
    members:
      - target: claude-haiku-4-5-20251001
