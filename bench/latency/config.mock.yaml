# Busbar deployment config for the latency benchmark. One provider (the local mock), one model, one
# single-member pool. Token auth with a fixed bench token so the load generator can authenticate.
# Governance is OFF — we are measuring the proxy hot path, not the control plane.
listen: "127.0.0.1:8080"

auth:
  mode: token
  client_tokens:
    - "bench-token"

providers:
  mock:
    api_key_env: BENCH_MOCK_KEY   # any value; the mock ignores it. Set BENCH_MOCK_KEY=x in env.

models:
  bench-model:
    provider: mock
    max_concurrent: 256           # high enough not to be the bottleneck at bench concurrency
    max_requests: -1

pools:
  bench-pool:
    members:
      - target: bench-model
