#
# Minimal provider catalog for the latency benchmark. Defines ONE provider, `mock`, whose base_url
# points at the local fixed-latency mock upstream (mock_upstream.py). Busbar's OpenAI writer appends
# `/v1/chat/completions`, which the mock serves. No real network egress, no real keys.
mock:
  protocol: openai
  base_url: http://127.0.0.1:9001
  error_map: {}
