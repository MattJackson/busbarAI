#
# One provider, `mock`, pointing at the local fast mock (mock.go). Busbar's OpenAI writer appends
# `/v1/chat/completions`, which the mock serves. No real egress, no real keys.
mock:
  protocol: openai
  base_url: http://127.0.0.1:8000
  error_map: {}
