<svg width="2256" height="382" viewBox="0 0 1128 191" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Busbar — Your AI Control Plane">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- surface -->
  <rect width="1128" height="191" fill="url(#bg)"/>

  <!-- faint oversized glyph watermark, far right -->
  <g transform="translate(1000 96) scale(1.9) translate(-62 -64)" opacity="0.10">
    <rect x="46" y="39" width="9" height="50" rx="4.5" fill="#A3E635"/>
    <g stroke="#A3E635" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <line x1="36" y1="64" x2="41" y2="64" stroke-width="5"/>
      <path d="M60 45 L79 45 Q87 45 87 55" stroke-width="5"/>
      <line x1="60" y1="64" x2="72" y2="64" stroke-width="5"/>
      <path d="M60 83 L79 83 Q87 83 87 73" stroke-width="5"/>
    </g>
    <g fill="#A3E635">
      <circle cx="31" cy="64" r="4.6"/><circle cx="87" cy="55" r="4.6"/>
      <circle cx="76" cy="64" r="4.6"/><circle cx="87" cy="73" r="4.6"/>
    </g>
  </g>

  <!-- LEFT GAP (x < 300) intentionally clear: the Company Page logo overlaps the
       bottom-left, so all content starts right of it. -->

  <!-- hero tagline -->
  <text x="300" y="86" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">Your <tspan fill="#A3E635">AI Control Plane</tspan></text>

  <!-- supporting line -->
  <text x="302" y="120" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16.5" font-weight="500" fill="#94A3B8">Lossless translation · fault-aware circuit breaking · in-flight failover · one Rust binary</text>

  <!-- url, bottom-right (clear of the logo) -->
  <text x="1088" y="158" text-anchor="end" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#A3E635">getbusbar.com</text>
</svg>
